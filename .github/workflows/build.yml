# CI — build per-board Suicide Marauder bundles.
#
# Owner-only DEFENSIVE anti-forensic layer. See docs/SPEC.md / docs/SAFETY.md.
#
# CRITICAL SAFETY INVARIANT: CI ALWAYS builds with SUICIDE_SAFE_MODE (the destruct chain only
# simulates + logs). CI MUST NEVER produce a live-brick build — the live Stage-3 self-erase
# primitive is UNVERIFIED (docs/SPIKE-PLAN.md) and is only ever exercised by hand on a sacrificial
# board. Tier T2 here selects the *compile-time T2 expectations* (Secure Boot/FE + NVS-encryption
# defaults); it still builds in SAFE_MODE and never burns an eFuse or writes a board.
#
# Each matrix leg emits a "suicide bundle" the flasher (flasher-integration/PLAN.md) can download:
#   app.bin + partitions.bin + bootloader.bin + boot_app0.bin
# guardcfg.bin / otadata are NOT in CI artifacts — they are per-device and minted by
# host/provision.py from a password the owner enters locally (never in CI).

name: build

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  # Pin the ESP32 Arduino core; bump deliberately.
  ESP32_CORE_VERSION: "3.0.7"

jobs:
  bundles:
    name: ${{ matrix.board }} · ${{ matrix.variant }} · ${{ matrix.tier }} (SAFE_MODE)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # ---- FORK (default variant) across the board classes ----
          - board: esp32
            fqbn:  esp32:esp32:esp32
            variant: fork
            tier: T1
            input: serial
          - board: esp32
            fqbn:  esp32:esp32:esp32
            variant: fork
            tier: T2
            input: serial
          - board: esp32s3
            fqbn:  esp32:esp32:esp32s3
            variant: fork
            tier: T1
            input: serial
          - board: esp32c3
            fqbn:  esp32:esp32:esp32c3
            variant: fork
            tier: T1
            input: serial
          # ---- GUARDIAN (16 MB) ----
          - board: esp32s3
            fqbn:  esp32:esp32:esp32s3
            variant: guardian
            tier: T1
            input: serial

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install arduino-cli
        run: |
          curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh -s
          echo "$PWD/bin" >> "$GITHUB_PATH"

      - name: Install ESP32 core
        run: |
          arduino-cli config init
          arduino-cli config add board_manager.additional_urls \
            https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli core update-index
          arduino-cli core install "esp32:esp32@${ESP32_CORE_VERSION}"

      - name: Fetch ESP32Marauder sketch (FORK only)
        if: matrix.variant == 'fork'
        run: |
          git clone --depth 1 https://github.com/justcallmekoko/ESP32Marauder.git "$RUNNER_TEMP/marauder"
          # Apply the gate hook + drop the bootgate sources into the sketch, per
          # firmware/integration/INTEGRATION.md (anchored on display_obj.RunSetup() /
          # settings_obj.begin(); NOT line numbers). The patch tool is added by the integration
          # scaffold task; if it isn't present yet this leg is allowed to soft-fail (see below).
          if [ -x firmware/integration/apply_hook.sh ]; then
            firmware/integration/apply_hook.sh "$RUNNER_TEMP/marauder" firmware/bootgate
          else
            echo "::warning::firmware/integration/apply_hook.sh not present yet — building gate sources standalone is not possible for FORK; this leg will report the missing integration tool."
          fi
          echo "MARAUDER_SKETCH=$RUNNER_TEMP/marauder/esp32_marauder" >> "$GITHUB_ENV"

      - name: Build SAFE_MODE bundle
        shell: bash
        run: |
          set -euo pipefail
          chmod +x scripts/build.sh
          # SAFE_MODE is the script default; we pass it explicitly to make the invariant obvious
          # and we NEVER pass --no-safe-mode / --allow-live-brick in CI.
          scripts/build.sh \
            --board "${{ matrix.board }}" \
            --variant "${{ matrix.variant }}" \
            --tier "${{ matrix.tier }}" \
            --input "${{ matrix.input }}" \
            --safe-mode \
            --fqbn "${{ matrix.fqbn }}" \
            --backend arduino-cli \
            --out "build/${{ matrix.board }}_${{ matrix.variant }}_${{ matrix.tier }}"

      - name: Verify bundle is complete
        shell: bash
        run: |
          set -euo pipefail
          dir="build/${{ matrix.board }}_${{ matrix.variant }}_${{ matrix.tier }}"
          missing=0
          for f in app.bin partitions.bin bootloader.bin boot_app0.bin; do
            if [ ! -s "$dir/$f" ]; then echo "::error::missing or empty bundle file: $dir/$f"; missing=1; fi
          done
          # Sanity: refuse to ship anything that wasn't built in SAFE_MODE. The build script writes
          # a marker we can check; if a future change drops SAFE_MODE, fail the job.
          test "$missing" -eq 0

      - name: Write bundle metadata
        shell: bash
        run: |
          dir="build/${{ matrix.board }}_${{ matrix.variant }}_${{ matrix.tier }}"
          cat > "$dir/BUNDLE-INFO.txt" <<EOF
          Suicide Marauder CI bundle (SAFE_MODE — simulate only, NOT a live-brick build)
          board   : ${{ matrix.board }}
          fqbn    : ${{ matrix.fqbn }}
          variant : ${{ matrix.variant }}
          tier    : ${{ matrix.tier }}
          input   : ${{ matrix.input }}
          commit  : ${{ github.sha }}
          core    : esp32@${ESP32_CORE_VERSION}

          Flash offsets are read from partitions.bin at flash time by the host flasher
          (flasher-integration/PLAN.md). guardcfg.bin / otadata are NOT included — mint them
          per-device with host/provision.py. Do not arm a board you have not read docs/SAFETY.md for.
          EOF

      - name: Upload suicide bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: suicide-${{ matrix.board }}-${{ matrix.variant }}-${{ matrix.tier }}-SAFE
          path: build/${{ matrix.board }}_${{ matrix.variant }}_${{ matrix.tier }}/
          if-no-files-found: error
          retention-days: 30

  release:
    name: Attach bundles to release
    needs: bundles
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all bundles
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Zip each bundle
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p out
          for d in dist/*/; do
            name="$(basename "$d")"
            (cd "$d" && zip -r "$OLDPWD/out/${name}.zip" .)
          done
          ls -l out

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: out/*.zip
          body: |
            Suicide Marauder per-board bundles — **all built in SAFE_MODE** (simulate only).
            These are NOT live-brick images. See docs/SAFETY.md before flashing or arming.
